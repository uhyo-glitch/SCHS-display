<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="600">
    <title>세종캠퍼스고등학교 | 안내</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --accent-blue: #0055ff; --text-main: #1d1d1f; --text-sub: #6e6e73; --bg-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { height: 100%; font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; }
        .ambient-light { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 50% 50%, #f0f4ff 0%, #ffffff 80%); z-index: -1; }
        
        /* 상단 로고 */
        header { width: 100%; padding-top: 80px; display: flex; justify-content: center; z-index: 10; }
        .logo-img { height: 75px; width: auto; }

        /* 메인 문구 */
        .hero-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 40px; }
        .welcome-title { font-size: 6.8rem; font-weight: 800; line-height: 1.15; letter-spacing: -0.04em; margin-bottom: 45px; word-break: keep-all; }
        .slogan-box { font-size: 2.7rem; font-weight: 300; color: var(--text-sub); }
        .slogan-box b { font-weight: 600; color: var(--accent-blue); }

        /* 하단 버튼 */
        nav { width: 100%; padding-bottom: 110px; display: flex; justify-content: center; gap: 55px; z-index: 10; }
        .nav-btn { all: unset; width: 300px; height: 105px; border-radius: 28px; background: #f5f5f7; font-size: 1.5rem; font-weight: 600; color: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .nav-btn:hover { background: var(--text-main); color: #ffffff; transform: translateY(-10px); box-shadow: 0 40px 80px rgba(0,0,0,0.08); }

        /* 배치도 팝업 */
        #mapOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .close-btn { position: absolute; top: 40px; right: 40px; font-size: 1.8rem; font-weight: 700; cursor: pointer; padding: 15px 30px; border-radius: 15px; background: #eee; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 15px 45px; font-size: 1.5rem; font-weight: 700; border: none; border-radius: 15px; background: #f0f0f2; color: #666; cursor: pointer; }
        .tab-btn.active { background: var(--accent-blue); color: white; }

        .viewer { width: 100%; max-width: 1400px; height: 75vh; display: flex; justify-content: center; align-items: center; border: 1px solid #eee; border-radius: 20px; background: #fff; overflow: hidden; }
        .map-img { max-width: 95%; max-height: 95%; object-fit: contain; display: none; }
        .map-img.active { display: block; }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <header>
        <img src="https://github.com/user-attachments/assets/534ceff2-2513-463f-a7da-ab6bb231f47c" alt="세종캠퍼스고등학교" class="logo-img">
    </header>
    <main class="hero-container">
        <h1 class="welcome-title">세종캠퍼스고등학교<br>방문을 환영합니다</h1>
        <p class="slogan-box">저마다의 <b>빛깔</b>을 찾아 모두가 <b>특별</b>해지는 배움터</p>
    </main>
    <nav>
        <button onclick="window.open('https://www.schoolinfo.go.kr/ei/ss/Pneiss_b01_s0.do?SHL_IDF_CD=3aaa3131-652e-4ac3-9219-8e628f474f0e', 'pop1', 'width=1200,height=900');" class="nav-btn">학교정보</button>
        <button onclick="toggleMap(true)" class="nav-btn">교내배치도</button>
        <button onclick="window.open('https://sejongcampus.sjeduhs.kr/sejongcampus-h/main.do', 'pop3', 'width=1280,height=900');" class="nav-btn">홈페이지</button>
    </nav>

    <!-- 배치도 팝업 -->
    <div id="mapOverlay">
        <div class="close-btn" onclick="toggleMap(false)">닫기 ✕</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showFloor(1)">1층</button>
            <button class="tab-btn" onclick="showFloor(2)">2층</button>
            <button class="tab-btn" onclick="showFloor(3)">3층</button>
            <button class="tab-btn" onclick="showFloor(4)">4층</button>
        </div>
        <div class="viewer">
            <!-- 혹시 모를 경로 오류를 방지하기 위해 전체 주소를 다 적었습니다. -->
            <img src="https://uhyo-glitch.github.io/SCHS-display/map_1.png" id="img1" class="map-img active">
            <img src="https://uhyo-glitch.github.io/SCHS-display/map_2.png" id="img2" class="map-img">
            <img src="https://uhyo-glitch.github.io/SCHS-display/map_3.png" id="img3" class="map-img">
            <img src="https://uhyo-glitch.github.io/SCHS-display/map_4.png" id="img4" class="map-img">
        </div>
    </div>

    <script>
        function toggleMap(show) { document.getElementById('mapOverlay').style.display = show ? 'flex' : 'none'; }
        function showFloor(n) {
            document.querySelectorAll('.map-img').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('img' + n).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
