<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="600">
    <title>세종캠퍼스고등학교 | 안내</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --accent-blue: #0055ff;
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --bg-color: #ffffff;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            /* 전체 구조를 유연한 플렉스 박스로 설정 */
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단: 로고 영역 (고정 위치) */
        header {
            width: 100%;
            padding-top: 80px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .logo-img {
            height: 80px;
            width: auto;
        }

        /* 2. 중앙: 히어로 문구 (화면 정중앙 고정) */
        .hero-container {
            flex: 1; /* 남은 모든 공간을 차지하여 중앙 정렬의 기반이 됨 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 세로 중앙 맞춤 */
            align-items: center;     /* 가로 중앙 맞춤 */
            text-align: center;
            padding: 0 40px;
        }

        .welcome-title {
            font-size: 7.5rem; /* 기존 대비 50% 확대 유지 */
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.045em;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .slogan-box {
            font-size: 3rem; /* 기존 대비 50% 확대 유지 */
            font-weight: 300;
            color: var(--text-sub);
            letter-spacing: -0.01em;
            word-break: keep-all;
        }

        .slogan-box b {
            font-weight: 600;
            color: var(--accent-blue);
        }

        /* 3. 하단: 네비게이션 (고정 위치) */
        nav {
            width: 100%;
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 10;
        }

        .nav-btn {
            all: unset;
            width: 320px;
            height: 110px;
            border-radius: 30px;
            background: #f5f5f7;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .nav-btn:hover {
            background: var(--text-main);
            color: #ffffff;
            transform: translateY(-10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        /* 배경 장식 */
        .ambient-light {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, #f0f4ff 0%, #ffffff 80%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <header>
        <img src="https://github.com/user-attachments/assets/534ceff2-2513-463f-a7da-ab6bb231f47c" 
             alt="세종캠퍼스고등학교" class="logo-img">
    </header>

    <main class="hero-container">
        <h1 class="welcome-title">경상북도경주교육지원청 여러분의<br>방문을 진심으로 환영합니다</h1>
        <p class="slogan-box">
            저마다의 <b>빛깔</b>을 찾아 모두가 <b>특별</b>해지는 배움터
        </p>
    </main>

    <nav>
        <button onclick="window.open('https://www.schoolinfo.go.kr/ei/ss/Pneiss_b01_s0.do?SHL_IDF_CD=3aaa3131-652e-4ac3-9219-8e628f474f0e', 'pop1', 'width=1200,height=900,scrollbars=yes');" class="nav-btn">
            학교정보
        </button>
        
        <button onclick="window.open('https://drive.google.com/file/d/1Qp-rj9DwZk3KImYj-MKpgpJu8k6AhuEB/view?usp=drive_link', 'pop2', 'width=1200,height=900,scrollbars=yes');" class="nav-btn">
            교내배치도
        </button>
        
        <button onclick="window.open('https://sejongcampus.sjeduhs.kr/sejongcampus-h/main.do', 'pop3', 'width=1280,height=900,scrollbars=yes');" class="nav-btn">
            홈페이지
        </button>
    </nav>

</body>
</html>
